llm:
  # 是否启用 LLM 解析（false 时仅用规则解析）
  enabled: true
  # 智谱开放平台 API Key（在 https://open.bigmodel.cn/ 控制台创建）
  api-key: 5086d77dd330488e9432760eb424d40c.2LLzxjPErSIxpfnY
  # 模型名：glm-4-flash（免费）/ glm-4-flashx / glm-4-plus
  model: glm-4-flash
  # API 地址（兼容 OpenAI 协议）
  base-url: https://open.bigmodel.cn/api/paas/v4
  # 超时（毫秒）
  timeout: 30000
  # 温度：0.1 适合结构化输出
  temperature: 0.1
